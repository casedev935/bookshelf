services:
  api:
    image: bookshelf-api:local
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - "3001:3001"
    networks:
      - default

  web:
    image: bookshelf-web:local
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - HOSTNAME=0.0.0.0
      - PORT=3000
    networks:
      - default

networks:
  gateway_network:
    external: false
