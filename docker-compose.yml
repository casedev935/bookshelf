services:
  database:
    image: postgres:15-alpine
    container_name: bookshelf-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: bookshelf-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - database
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: bookshelf-api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_BASE_URL=${TMDB_BASE_URL}
      - NEXT_PUBLIC_API_URL=https://api-bookshelf.mediamanager.tech/api
    networks:
      - default
      - gateway_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookshelf-api.rule=Host(`api-bookshelf.mediamanager.tech`)"
      - "traefik.http.routers.bookshelf-api.entrypoints=websecure"
      - "traefik.http.routers.bookshelf-api.tls.certresolver=myresolver"
      - "traefik.http.services.bookshelf-api.loadbalancer.server.port=3001"
      - "traefik.docker.network=gateway_network"

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    container_name: bookshelf-web
    restart: always
    networks:
      - default
      - gateway_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookshelf-web.rule=Host(`bookshelf.mediamanager.tech`)"
      - "traefik.http.routers.bookshelf-web.entrypoints=websecure"
      - "traefik.http.routers.bookshelf-web.tls.certresolver=myresolver"
      - "traefik.http.services.bookshelf-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=gateway_network"

networks:
  gateway_network:
    external: true

volumes:
  postgres_data:
